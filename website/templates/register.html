<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MMU OSSD</title>
    <meta name="description" content="Create your MMU Open Source Student Directory account">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .card { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-red-50 flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <a href="/"><h1 class="text-4xl font-extrabold tracking-tight text-gray-900">MMU <span class="font-light text-red-600">OSSD</span></h1></a>
            <p class="text-gray-400 text-sm mt-2">Open Source Student Directory</p>
        </div>

        <div class="card bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-black text-gray-900 mb-1">Create account</h2>
            <p class="text-gray-400 text-sm mb-6">Join the MMU open source community</p>

            <div id="error-msg" class="hidden items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5">
                <i class="fas fa-circle-exclamation"></i>
                <span id="error-text"></span>
            </div>
            <div id="success-msg" class="hidden items-center gap-3 bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-xl mb-5">
                <i class="fas fa-circle-check"></i>
                <span id="success-text"></span>
            </div>

            <form id="register-form" class="space-y-4" novalidate>
                <div>
                    <label for="reg-name" class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="e.g. Alex Tan"
                        class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div>
                    <label for="reg-email" class="block text-sm font-bold text-gray-700 mb-1">Email address</label>
                    <input type="email" id="reg-email" required placeholder="student@mmu.edu.my"
                        class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div>
                    <label for="reg-password" class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="reg-password" required placeholder="Min. 6 characters"
                            class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50 pr-11">
                        <button type="button" id="toggle-pw"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="reg-confirm" class="block text-sm font-bold text-gray-700 mb-1">Confirm Password</label>
                    <input type="password" id="reg-confirm" required placeholder="••••••••"
                        class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>

                <!-- Password strength bar -->
                <div>
                    <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div id="strength-bar" class="h-full rounded-full transition-all duration-300 w-0 bg-red-400"></div>
                    </div>
                    <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
                </div>

                <button type="submit" id="register-btn"
                    class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-3 rounded-xl transition-all text-sm flex items-center justify-center gap-2">
                    <span id="btn-label">Create Account</span>
                    <i id="btn-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <p class="text-center text-sm text-gray-400 mt-6">
                Already have an account?
                <a href="/login" class="text-red-600 font-bold hover:underline">Sign in</a>
            </p>
        </div>
    </div>

<script>
    // Password visibility toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
        const pw   = document.getElementById('reg-password');
        const icon = document.querySelector('#toggle-pw i');
        pw.type = pw.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });

    // Password strength
    document.getElementById('reg-password').addEventListener('input', (e) => {
        const val = e.target.value;
        const bar = document.getElementById('strength-bar');
        const lbl = document.getElementById('strength-label');
        const strength = [/[a-z]/, /[A-Z]/, /[0-9]/, /[^A-Za-z0-9]/, /.{8,}/]
            .filter(r => r.test(val)).length;
        const levels = [
            { w: '0%',   color: 'bg-red-400',    text: '' },
            { w: '25%',  color: 'bg-red-400',    text: 'Weak' },
            { w: '50%',  color: 'bg-orange-400',  text: 'Fair' },
            { w: '75%',  color: 'bg-yellow-400',  text: 'Good' },
            { w: '90%',  color: 'bg-green-400',   text: 'Strong' },
            { w: '100%', color: 'bg-green-600',   text: 'Very strong' },
        ];
        const lvl = levels[Math.min(strength, 5)];
        bar.style.width = lvl.w;
        bar.className   = `h-full rounded-full transition-all duration-300 ${lvl.color}`;
        lbl.textContent = val.length ? lvl.text : '';
    });

    function showError(msg) {
        const box = document.getElementById('error-msg');
        document.getElementById('error-text').textContent = msg;
        box.classList.remove('hidden');
        box.classList.add('flex');
        document.getElementById('success-msg').classList.add('hidden');
    }
    function showSuccess(msg) {
        const box = document.getElementById('success-msg');
        document.getElementById('success-text').textContent = msg;
        box.classList.remove('hidden');
        box.classList.add('flex');
        document.getElementById('error-msg').classList.add('hidden');
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn     = document.getElementById('register-btn');
        const label   = document.getElementById('btn-label');
        const spinner = document.getElementById('btn-spinner');

        const password = document.getElementById('reg-password').value;
        const confirm  = document.getElementById('reg-confirm').value;
        if (password !== confirm) { showError('Passwords do not match'); return; }
        if (password.length < 6)  { showError('Password must be at least 6 characters'); return; }

        btn.disabled = true;
        label.textContent = 'Creating account…';
        spinner.classList.remove('hidden');

        try {
            const res = await fetch('/api/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    name:     document.getElementById('reg-name').value.trim(),
                    email:    document.getElementById('reg-email').value.trim().toLowerCase(),
                    password,
                })
            });
            const data = await res.json();
            if (res.ok) {
                showSuccess('Account created! Redirecting to login…');
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                showError(data.error || 'Registration failed');
            }
        } catch {
            showError('Connection error — is the Flask server running?');
        } finally {
            btn.disabled = false;
            label.textContent = 'Create Account';
            spinner.classList.add('hidden');
        }
    });
</script>
</body>
</html>
